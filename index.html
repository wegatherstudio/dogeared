<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Dogeared — Build a Reading Life</title>
<meta name="description" content="A premium, social reading companion. Track sessions like workouts, reflect in a private journal, discover books made for you, and turn reading into a ritual.">
<meta name="theme-color" content="#F3EFE1">

<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" href="icons/favicon.png">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Dogeared">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200;0,6..72,300;0,6..72,400;0,6..72,500;1,6..72,300&family=Outfit:wght@200;300;400;500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div id="app"></div>
  <div id="feed-root" class="hidden"></div>

  <nav class="tabbar" aria-label="Main">
    <div class="dock">
      <button data-view="home" class="active" aria-label="Home">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>
        Home
      </button>
      <button data-view="discover" aria-label="Discover">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a10 10 0 1 0 .001 0z"/><path d="m14.5 9.5-2 5-5 2 2-5z"/></svg>
        Discover
      </button>
      <div class="dock-spacer" aria-hidden="true"></div>
      <button data-view="library" aria-label="Library">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h5v16H4z"/><path d="M9 6h5v14H9z"/><path d="m14 6.5 4.6-1 3 15-4.6 1z"/></svg>
        Library
      </button>
      <button data-view="profile" aria-label="Profile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="3.6"/><path d="M4.5 20c1.6-3.6 5-5.4 7.5-5.4s5.9 1.8 7.5 5.4"/></svg>
        Profile
      </button>
    </div>
    <button class="cta" aria-label="Start reading session">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3.5 2"/></svg>
    </button>
  </nav>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="js/icons.js"></script>
  <script src="js/catalog.js"></script>
  <script src="js/store.js"></script>
  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
